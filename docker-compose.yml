services:
  - name: fastapi-backend
    type: web
    runtime: docker
    dockerfilePath: ./Dockerfile
    startCommand: uvicorn src.backend.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: MODEL_PATH
        value: model/model.pkl
      - key: PORT
        value: "10000"

  - name: streamlit-frontend
    type: web
    runtime: docker
    dockerfilePath: ./Dockerfile
    startCommand: streamlit run src/frontend/app.py --server.port 10000 --server.address 0.0.0.0
    envVars:
      - key: API_URL
        value: https://fastapi-backend.onrender.com